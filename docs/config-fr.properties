description=Ce modèle ontologique formalise et améliore la description des métadonnées autour de corpus. Nommé CAO_CRM, il met en œuvre -- comme sous-ensemble borné et composé de CIDOC CRM et de ses extensions LRMoo et CRMdig -- le modèle conceptuel discuté et schématisé par Mélanie Bouland au sein du Consortium Huma-Num ARIANE. Cet encodage RDF/OWL précis est une implémentation nouvelle et indépendante, distincte du fichier initialement livré par Mme Bouland : il a été construit avec l'outil ROBOT (extraction de module, http://robot.obolibrary.org/), soumis au raisonneur OWL HermiT (http://www.hermit-reasoner.com/), vérifié contre des contraintes SHACL, et validé visuellement dans Protégé (https://protege.stanford.edu/), puis revérifié par une chaîne de trois audits indépendants et successifs.
