abstract=Cette version (1.0, publiée le 8 juillet 2026) de CAO_CRM est un réencodage complet, en RDF/OWL, du modèle conceptuel discuté et schématisé à l'origine par Mélanie Bouland au sein du Consortium Huma-Num ARIANE. L'encodage a été réalisé de façon indépendante par Andrés Echavarría Peláez, pour le projet AMIS, selon une méthode reproductible : l'ensemble exact des classes et propriétés nécessaires a été extrait des versions officielles de CIDOC CRM 7.1.3, LRMoo 1.1.1 et CRMdig 5.0 avec l'outil ROBOT, en une seule passe combinée afin de préserver les relations traversant les trois ontologies dans le périmètre choisi. Le résultat a été soumis au raisonneur OWL HermiT pour en confirmer la cohérence logique, validé contre des contraintes SHACL, et vérifié visuellement dans Protégé, puis revérifié par une chaîne de trois audits indépendants et successifs.
