abstract=Esta versión (1.0, publicada el 8 de julio de 2026) de CAO_CRM es una recodificación completa, en RDF/OWL, del modelo conceptual discutido y esquematizado originalmente por Mélanie Bouland en el Consorcio Huma-Num ARIANE. La codificación fue realizada de forma independiente por Andrés Echavarría Peláez, para el proyecto AMIS, siguiendo un método reproducible: el conjunto exacto de clases y propiedades necesarias se extrajo de las versiones oficiales de CIDOC CRM 7.1.3, LRMoo 1.1.1 y CRMdig 5.0 con la herramienta ROBOT, en una sola pasada combinada para preservar las relaciones que atraviesan las tres ontologías dentro del alcance elegido. El resultado se sometió al razonador OWL HermiT para confirmar su coherencia lógica, se validó contra restricciones SHACL, y se verificó visualmente en Protégé, y luego se reverificó mediante una cadena de tres auditorías independientes y sucesivas.
