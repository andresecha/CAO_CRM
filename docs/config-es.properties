description=Este modelo ontológico formaliza y mejora la descripción de metadatos en torno a corpus. Llamado CAO_CRM, implementa -- como un subconjunto acotado y compuesto de CIDOC CRM y sus extensiones LRMoo y CRMdig -- el modelo conceptual discutido y esquematizado por Mélanie Bouland en el Consorcio Huma-Num ARIANE. Esta codificación RDF/OWL en particular es una implementación nueva e independiente, distinta del archivo originalmente entregado por la Sra. Bouland: se construyó con la herramienta ROBOT (extracción de módulo, http://robot.obolibrary.org/), se sometió al razonador OWL HermiT (http://www.hermit-reasoner.com/), se verificó contra restricciones SHACL, y se validó visualmente en Protégé (https://protege.stanford.edu/), y luego se reverificó mediante una cadena de tres auditorías independientes y sucesivas.
