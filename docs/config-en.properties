abstract=This version (1.0, published July 8, 2026) of CAO_CRM is a complete re-encoding, in RDF/OWL, of the conceptual model originally discussed and diagrammed by Mélanie Bouland within the Consortium Huma-Num ARIANE. The encoding was produced independently by Andrés Echavarría Peláez, for the AMIS project, using a reproducible method: the exact set of classes and properties needed was extracted from the official CIDOC CRM 7.1.3, LRMoo 1.1.1 and CRMdig 5.0 releases with the ROBOT ontology toolkit, in a single combined pass to preserve cross-ontology relationships within the chosen scope. The result was reasoned over with the HermiT OWL reasoner to confirm logical consistency, validated against SHACL constraints, and visually checked in Protégé, then re-verified by a chain of three independent, successive audits.
