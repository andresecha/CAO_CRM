description=This ontological model formalizes and improves the description of metadata around corpora. Named CAO_CRM, it implements -- as a bounded, composed subset of CIDOC CRM and its extensions LRMoo and CRMdig -- the conceptual model discussed and diagrammed by Mélanie Bouland within the Consortium Huma-Num ARIANE. This particular RDF/OWL encoding is a new, independent implementation, distinct from the file originally delivered by Ms. Bouland: it was built with the ROBOT ontology toolkit (module extraction, http://robot.obolibrary.org/), reasoned over with the HermiT OWL reasoner (http://www.hermit-reasoner.com/), checked against SHACL constraints, and visually validated in Protégé (https://protege.stanford.edu/), then re-verified by a chain of three independent, successive audits.
